<!DOCTYPE html>
<html>
<head>
    <title>System Logs - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .logs-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .log-entry {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-family: monospace;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-entry:hover { background: #f8f9fa; }
        .log-info { border-left: 3px solid #17a2b8; }
        .log-error { border-left: 3px solid #dc3545; }
        .log-warning { border-left: 3px solid #ffc107; }
        .log-success { border-left: 3px solid #28a745; }
        .loading-spinner { text-align: center; padding: 40px; }
        .log-time { color: #6c757d; font-size: 12px; min-width: 160px; }
    </style>
</head>
<body>
<script src="/admin_guard.js"></script>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white"><i class="fas fa-history"></i> System Logs</h2>
        <div>
            <button class="btn-gradient me-2" onclick="refreshLogs()">
                <i class="fas fa-sync"></i> Refresh
            </button>
            <a href="/dashboard.html" class="btn-gradient">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </div>

    <div class="logs-container">
        <h5><i class="fas fa-list"></i> Recent Activity</h5>
        
        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Loading logs...</p>
        </div>
        
        <div id="logsList" style="display: none;">
            <div class="mt-3" id="logsContainer"></div>
        </div>
        
        <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> <span id="errorText"></span>
        </div>
        
        <div id="emptyMessage" class="alert alert-info mt-3" style="display: none;">
            <i class="fas fa-info-circle"></i> No logs found. System is running smoothly!
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_BASE = 'https://product-polarization-analyzer-production.up.railway.app';
let refreshInterval = null;

async function loadLogs() {
    document.getElementById('loadingSpinner').style.display = 'block';
    document.getElementById('logsList').style.display = 'none';
    document.getElementById('errorMessage').style.display = 'none';
    document.getElementById('emptyMessage').style.display = 'none';
    
    try {
        const token = localStorage.getItem('token');
        
        // ✅ ADD TOKEN HEADER
        const response = await fetch(`${API_BASE}/api/view-logs`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (response.status === 401) {
            showError('❌ Session expired. Please login again.');
            setTimeout(() => window.location.href = '/login.html', 2000);
            return;
        }

        const data = await response.json();
        
        if (data.status === 'success') {
            displayLogs(data.logs || []);
            document.getElementById('logsList').style.display = 'block';
        } else {
            showError(data.message || 'Failed to load logs');
        }
    } catch (error) {
        console.error('Error:', error);
        showError(error.message || 'Network error. Please try again.');
    } finally {
        document.getElementById('loadingSpinner').style.display = 'none';
    }
}
function displayLogs(logs) {
    const container = document.getElementById('logsContainer');
    container.innerHTML = '';
    
    if (!logs || logs.length === 0) {
        document.getElementById('emptyMessage').style.display = 'block';
        return;
    }
    
    logs.forEach(log => {
        const div = document.createElement('div');
        let logType = 'info';
        let badgeClass = 'bg-info';
        let logClass = 'log-info';
        const lower = log.toLowerCase();
        
        if (lower.includes('error') || lower.includes('fail')) {
            logType = 'error';
            badgeClass = 'bg-danger';
            logClass = 'log-error';
        } else if (lower.includes('warning')) {
            logType = 'warning';
            badgeClass = 'bg-warning';
            logClass = 'log-warning';
        } else if (lower.includes('success') || lower.includes('✅')) {
            logType = 'success';
            badgeClass = 'bg-success';
            logClass = 'log-success';
        }
        
        const timestamp = new Date().toLocaleTimeString();
        div.className = `log-entry ${logClass}`;
        div.innerHTML = `
            <span>
                <span class="badge ${badgeClass}">${logType.toUpperCase()}</span>
                <span class="ms-2">${log}</span>
            </span>
            <span class="log-time"><i class="far fa-clock"></i> ${timestamp}</span>
        `;
        container.appendChild(div);
    });
}

function refreshLogs() { loadLogs(); }
function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorMessage').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', function() {
    if (!localStorage.getItem('token')) {
        window.location.href = '/login.html';
        return;
    }
    loadLogs();
    refreshInterval = setInterval(loadLogs, 30000);
});

window.addEventListener('beforeunload', function() {
    if (refreshInterval) clearInterval(refreshInterval);
});
</script>
</body>
</html>
