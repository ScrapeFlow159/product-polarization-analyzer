<!DOCTYPE html>
<html>
<head>
    <title>Test Custom Week</title>
</head>
<body>
    <h2>Test Custom Week Analysis</h2>
    <button onclick="test()">Click to Test</button>
    <pre id="result"></pre>

    <script>
        async function test() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch('http://localhost:8000/api/analyze-custom', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        platform: 'daraz',
                        category: 'earpods',
                        unit: 'days',
                        duration: 3,
                        max_products: 50
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
