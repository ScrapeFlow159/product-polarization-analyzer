<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }
    </style>
</head>
<script>
document.getElementById('otpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const otp = document.querySelector('[name="otp"]').value;
    const username = localStorage.getItem('username');
    
    try {
        const response = await fetch('https://product-polarization-analyzer-production.up.railway.app/verify_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ otp: otp })
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username);
            localStorage.setItem('role', data.role);
            window.location.href = '/dashboard.html';
        } else {
            alert('❌ ' + data.message);
        }
    } catch (error) {
        alert('❌ Network error: ' + error.message);
    }
});
</script>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4 text-center" style="width: 400px;">
    <h3 class="mb-4">
        <i class="fa-solid fa-shield-halved text-danger"></i> OTP Verification
    </h3>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} text-start small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- OTP Form -->
    <form method="POST">
        <div class="mb-3">
            <input type="text" name="otp" class="form-control text-center fs-4" placeholder="Enter 6-digit OTP" required>
        </div>

        <button type="submit" class="btn btn-danger w-100">
            <i class="fa-solid fa-check-circle"></i> Verify
        </button>
    </form>

    <!-- Resend OTP button -->
    {% if expired %}
    <form method="POST" action="{{ url_for('resend_otp') }}" class="mt-3">
        <button type="submit" class="btn btn-secondary w-100">
            <i class="fa-solid fa-rotate-right"></i> Resend OTP
        </button>
    </form>
    {% endif %}
</div>

</body>
</html>
