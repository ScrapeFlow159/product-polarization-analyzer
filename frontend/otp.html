<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4 text-center" style="width: 400px;">
    <h3 class="mb-4">
        <i class="fa-solid fa-shield-halved text-danger"></i> OTP Verification
    </h3>

    <form id="otpForm">
        <div class="mb-3">
            <input type="text" name="otp" class="form-control text-center fs-4" placeholder="Enter 6-digit OTP" required>
        </div>

        <button type="submit" class="btn btn-danger w-100 mb-3">
            <i class="fa-solid fa-check-circle"></i> Verify
        </button>
    </form>

    <hr>

    <div class="mt-2">
        <p class="small text-muted mb-1">Didn't receive the code?</p>
        <button id="resendBtn" class="btn btn-link btn-sm text-decoration-none" type="button">
            <i class="fa-solid fa-rotate-right"></i> Resend OTP
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('otpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const otp = document.querySelector('[name="otp"]').value;
    const username = localStorage.getItem('username'); // Gets the logged-in username safely
    
    try {
        const response = await fetch('https://product-polarization-analyzer-production.up.railway.app/verify_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                otp: otp,
                username: username // FIXED: Sent together so backend doesn't throw 400
            })
        });
        
        const data = await response.json();
        
        if (response.ok || data.status === 'success') {
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username);
            localStorage.setItem('role', data.role);
            alert('✅ Verification Successful!');
            window.location.href = '/dashboard.html';
        } else {
            alert('❌ ' + (data.message || 'Verification failed'));
        }
    } catch (error) {
        alert('❌ Network error: ' + error.message);
    }
});

document.getElementById('resendBtn').addEventListener('click', () => {
    alert('ℹ️ To refresh your verification token securely, please run a quick login re-auth.');
    window.location.href = '/login.html';
});
</script>
</body>
</html>
