<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4 text-center" style="width: 400px;">
    <h3 class="mb-4">
        <i class="fa-solid fa-shield-halved text-danger"></i> OTP Verification
    </h3>

    <form id="otpForm">
        <div class="mb-3">
            <input type="text" name="otp" class="form-control text-center fs-4" placeholder="Enter 6-digit OTP" required maxlength="6">
        </div>
        <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> <span id="errorText"></span>
        </div>

        <button type="submit" class="btn btn-danger w-100 mb-3">
            <i class="fa-solid fa-check-circle"></i> Verify
        </button>
        <div id="loadingSpinner" style="display: none;">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Verifying...</span>
            </div>
            <p class="mt-2 text-muted small">Please wait, verifying OTP...</p>
        </div>
    </form>

    <div class="mt-2">
        <p class="small text-muted mb-1">Didn't receive the code?</p>
        <button id="resendBtn" class="btn btn-link btn-sm text-decoration-none" type="button">
            <i class="fa-solid fa-rotate-right"></i> Resend OTP
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ============================================
    // OTP FORM SUBMIT - UPDATED VERSION
    // ============================================
    document.getElementById('otpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Error ko reset karein
        document.getElementById('errorMessage').style.display = 'none';
        
        const otpInput = document.querySelector('[name="otp"]');
        const otp = otpInput.value.trim();
        
        // Validate 6-digit
        if (!/^\d{6}$/.test(otp)) {
            showError('❌ Please enter a valid 6-digit OTP');
            otpInput.value = '';
            otpInput.focus();
            return;
        }
        
        const username = localStorage.getItem('username');
        if (!username) {
            showError('❌ Session expired. Please login again.');
            setTimeout(() => window.location.href = '/login.html', 2000);
            return;
        }
        
        const submitBtn = document.querySelector('button[type="submit"]');
        const spinner = document.getElementById('loadingSpinner');
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Verifying...';
        spinner.style.display = 'block';
        
        try {
            const response = await fetch('https://product-polarization-analyzer-production.up.railway.app/auth/verify_otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ otp: otp, username: username })
            });
            
            const data = await response.json();
            
            if (response.ok && data.status === 'success') {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username || username);
                localStorage.setItem('role', data.role || 'User');
                window.location.href = '/dashboard.html';
            } else {
                showError(data.message || data.detail || 'Invalid OTP');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Verify';
                spinner.style.display = 'none';
            }
        } catch (error) {
            showError('❌ Network error: ' + error.message);
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Verify';
            spinner.style.display = 'none';
        }
    });

    // ============================================
    // RESEND OTP FUNCTIONALITY
    // ============================================
    document.getElementById('resendBtn').addEventListener('click', async () => {
        const username = localStorage.getItem('username');
        if (!username) {
            showError('❌ Session expired. Please login again.');
            return;
        }
        
        const resendBtn = document.getElementById('resendBtn');
        resendBtn.disabled = true;
        resendBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
        
        try {
            const response = await fetch('https://product-polarization-analyzer-production.up.railway.app/auth/resend_otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username })
            });
            
            const data = await response.json();
            if (response.ok && data.status === 'success') {
                // Success ke liye bhi showError ka use kar sakte hain ya alert chhor sakte hain
                showError('✅ New OTP sent to your email!');
            } else {
                showError('❌ ' + (data.message || 'Failed to resend OTP'));
            }
        } catch (error) {
            showError('❌ Network error: ' + error.message);
        } finally {
            resendBtn.disabled = false;
            resendBtn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> Resend OTP';
        }
    });

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        if (errorDiv && errorText) {
            errorDiv.style.display = 'none'; // Reset first
            errorText.textContent = message;
            errorDiv.style.display = 'block';
        }
    }
</script>
</body>
</html>
