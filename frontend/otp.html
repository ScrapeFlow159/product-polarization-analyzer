<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4 text-center" style="width: 400px;">
    <h3 class="mb-4">
        <i class="fa-solid fa-shield-halved text-danger"></i> OTP Verification
    </h3>

    <form id="otpForm">
        <div class="mb-3">
            <input type="text" name="otp" class="form-control text-center fs-4" placeholder="Enter 6-digit OTP" required>
        </div>

        <button type="submit" class="btn btn-danger w-100 mb-3">
            <i class="fa-solid fa-check-circle"></i> Verify
        </button>
         <div id="loadingSpinner" style="display: none;">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Verifying...</span>
            </div>
            <p class="mt-2 text-muted small">Please wait, verifying OTP...</p>
        </div>
    </form>

    

    <div class="mt-2">
        <p class="small text-muted mb-1">Didn't receive the code?</p>
        <button id="resendBtn" class="btn btn-link btn-sm text-decoration-none" type="button">
            <i class="fa-solid fa-rotate-right"></i> Resend OTP
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('otpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const otp = document.querySelector('[name="otp"]').value;
    const username = localStorage.getItem('username');
    const submitBtn = document.querySelector('button[type="submit"]');
    const spinner = document.getElementById('loadingSpinner');
    
    if (!username) {
        alert('❌ Session expired. Please login again.');
        window.location.href = '/login.html';
        return;
    }
    
    // ✅ Show loading
    if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Verifying...';
    }
    if (spinner) {
        spinner.style.display = 'block';
    }
    
    try {
        const response = await fetch('https://product-polarization-analyzer-production.up.railway.app/auth/verify_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                otp: otp,
                username: username
            })
        });
        
        const data = await response.json();
        
        console.log('📦 Response:', data);  // ✅ Debug log
        
        if (response.ok && data.status === 'success') {
            // ✅ Success
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username || username);
            localStorage.setItem('role', data.role || 'User');
            window.location.href = '/dashboard.html';
        } else {
            // ❌ Error
            alert('❌ ' + (data.message || data.detail || 'Invalid OTP'));
            // Reset button
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Verify';
            }
            if (spinner) {
                spinner.style.display = 'none';
            }
        }
    } catch (error) {
        console.error('❌ Network error:', error);
        alert('❌ Network error: ' + error.message);
        // Reset button
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Verify';
        }
        if (spinner) {
            spinner.style.display = 'none';
        }
    }
});
</script>
</body>
</html>
