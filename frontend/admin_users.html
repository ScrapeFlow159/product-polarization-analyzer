<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-white">Manage Users</h2>
        <div class="bg-white p-4 rounded mt-3">
            <div id="loading">Loading...</div>
            <div id="usersContainer" style="display:none;"></div>
            <div id="error" style="display:none;color:red;"></div>
        </div>
    </div>

    <script>
    // ✅ DIRECT API CALL - NO TOKEN CHECK
    const API_BASE = 'https://product-polarization-analyzer-production.up.railway.app';

    async function loadUsers() {
        const loading = document.getElementById('loading');
        const container = document.getElementById('usersContainer');
        const errorDiv = document.getElementById('error');
        
        loading.style.display = 'block';
        container.style.display = 'none';
        errorDiv.style.display = 'none';
        
        try {
            const response = await fetch(`${API_BASE}/api/manage-users`);
            const data = await response.json();
            
            console.log('✅ API Response:', data);
            
            if (data.status === 'success' && data.users) {
                let html = `
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                data.users.forEach(user => {
                    // Role badge color
                    let badgeClass = 'bg-secondary';
                    if (user.role === 'Admin') badgeClass = 'bg-danger';
                    else if (user.role === 'Research Analyst') badgeClass = 'bg-warning text-dark';
                    
                    html += `
                        <tr>
                            <td>${user.id}</td>
                            <td><strong>${user.username}</strong></td>
                            <td>${user.email || 'N/A'}</td>
                            <td><span class="badge ${badgeClass}">${user.role}</span></td>
                        </tr>
                    `;
                });
                
                html += `
                            </tbody>
                        </table>
                    </div>
                    <p class="text-muted">Total: ${data.users.length} users</p>
                `;
                
                container.innerHTML = html;
                container.style.display = 'block';
            } else {
                errorDiv.textContent = 'Failed to load users: ' + (data.message || 'Unknown error');
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('❌ Error:', error);
            errorDiv.textContent = 'Network error: ' + error.message;
            errorDiv.style.display = 'block';
        } finally {
            loading.style.display = 'none';
        }
    }

    // ✅ Load directly on page load
    document.addEventListener('DOMContentLoaded', function() {
        console.log('📄 Page loaded');
        loadUsers();
    });
    </script>
</body>
</html>
