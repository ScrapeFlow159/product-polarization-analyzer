<!DOCTYPE html>
<html>
<head>
    <title>System Settings - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="admin_guard.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .hidden { display: none !important; }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .settings-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .form-label {
            font-weight: 600;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        .text-white {
            color: white;
        }
        .mt-2 { margin-top: 10px; }
        .mt-3 { margin-top: 15px; }
        .mt-4 { margin-top: 25px; }
        .mb-3 { margin-bottom: 15px; }
        .mb-4 { margin-bottom: 20px; }
        .ms-2 { margin-left: 10px; }
        .text-end { text-align: right; }
        .text-muted { color: #6c757d; }
        .small { font-size: 12px; }
        .alert { padding: 12px 20px; border-radius: 8px; margin-top: 10px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .form-control {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .form-check-input {
            width: 40px;
            height: 20px;
            cursor: pointer;
        }
        .form-check-label {
            margin-left: 10px;
            cursor: pointer;
        }
        .form-switch {
            display: flex;
            align-items: center;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: #5a6268;
            color: white;
        }
        hr {
            margin: 20px 0;
            border: 0;
            border-top: 1px solid #eee;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .d-flex {
            display: flex;
        }
        .justify-content-between {
            justify-content: space-between;
        }
        .align-items-center {
            align-items: center;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -10px;
        }
        .col-md-6 {
            width: 50%;
            padding: 0 10px;
            box-sizing: border-box;
        }
        @media (max-width: 768px) {
            .col-md-6 {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white"><i class="fas fa-cogs"></i> System Settings</h2>
        <a href="/dashboard.html" class="btn-gradient">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-white mt-2">Loading settings...</p>
    </div>

    <!-- Settings Form -->
    <div class="settings-card" id="settingsForm" style="display: none;">
        <h4><i class="fas fa-chart-line"></i> Analysis Configuration</h4>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Default K-Value (Clusters)</label>
                <input type="number" id="defaultKValue" class="form-control" min="2" max="5">
                <small class="text-muted">Number of clusters for analysis</small>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Max Products per Analysis</label>
                <input type="number" id="maxProducts" class="form-control" min="10" max="500">
                <small class="text-muted">Maximum products to analyze at once</small>
            </div>
        </div>

        <hr>

        <h4><i class="fas fa-calendar-alt"></i> Analysis Settings</h4>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Weekly Analysis</label>
                <select id="weeklyAnalysis" class="form-control">
                    <option value="true">Enabled</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Monthly Analysis</label>
                <select id="monthlyAnalysis" class="form-control">
                    <option value="true">Enabled</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <div class="form-switch">
                <input class="form-check-input" type="checkbox" id="autoScheduler">
                <label class="form-check-label" for="autoScheduler">Enable Automatic Weekly Data Collection</label>
            </div>
        </div>

        <hr>

        <h4><i class="fas fa-envelope"></i> Email Settings</h4>
        <div class="mb-3">
            <label class="form-label">Sender Email</label>
            <input type="email" id="senderEmail" class="form-control">
            <small class="text-muted">Email address used to send OTPs</small>
        </div>
        <div class="mb-3">
            <label class="form-label">OTP Expiry (minutes)</label>
            <input type="number" id="otpExpiry" class="form-control" min="5" max="30">
            <small class="text-muted">How long OTP remains valid</small>
        </div>

        <hr>

        <div class="text-end">
            <button type="button" class="btn-gradient" onclick="saveSettings()">
                <i class="fas fa-save"></i> Save Settings
            </button>
            <button type="button" class="btn-secondary ms-2" onclick="loadSettings()">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>

        <!-- Message Container -->
        <div id="settingsMessage" class="mt-3" style="display: none;"></div>
        
        <div class="mt-3 text-muted small">
            <i class="fas fa-clock"></i> Last updated: <span id="lastUpdated">Not set</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_BASE = 'https://product-polarization-analyzer-production.up.railway.app';

async function loadSettings() {
    const loadingSpinner = document.getElementById('loadingSpinner');
    const settingsForm = document.getElementById('settingsForm');
    const msg = document.getElementById('settingsMessage');
    
    // Hide message
    msg.style.display = 'none';
    
    // Show loading
    loadingSpinner.style.display = 'block';
    settingsForm.style.display = 'none';
    
    try {
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login.html';
            return;
        }
        
        const response = await fetch(`${API_BASE}/api/system-settings`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (response.status === 401) {
            showMessage('❌ Session expired. Please login again.', 'danger');
            setTimeout(() => window.location.href = '/login.html', 2000);
            return;
        }

        if (response.status === 403) {
            showMessage('❌ Unauthorized access. Admin privileges required.', 'danger');
            setTimeout(() => window.location.href = '/dashboard.html', 2000);
            return;
        }

        const data = await response.json();
        
        if (data.status === 'success') {
            const settings = data.settings || {};
            
            // Analysis settings
            document.getElementById('defaultKValue').value = settings.analysis?.default_k_value || 3;
            document.getElementById('maxProducts').value = settings.analysis?.max_products || 100;
            document.getElementById('weeklyAnalysis').value = settings.analysis?.weekly_analysis_enabled !== false ? 'true' : 'false';
            document.getElementById('monthlyAnalysis').value = settings.analysis?.monthly_analysis_enabled !== false ? 'true' : 'false';
            document.getElementById('autoScheduler').checked = settings.analysis?.weekly_analysis_enabled !== false;
            
            // Email settings
            document.getElementById('senderEmail').value = settings.email?.sender || 'admin@polarization.com';
            document.getElementById('otpExpiry').value = settings.email?.otp_expiry_minutes || 10;
            
            // Last updated
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
            
            // Show form
            settingsForm.style.display = 'block';
            showMessage('✅ Settings loaded successfully!', 'success');
            
        } else {
            showMessage('Failed to load settings: ' + (data.message || 'Unknown error'), 'danger');
        }
    } catch (error) {
        console.error('Error loading settings:', error);
        showMessage('Error loading settings. Please check your connection.', 'danger');
    } finally {
        loadingSpinner.style.display = 'none';
    }
}

async function saveSettings() {
    const msg = document.getElementById('settingsMessage');
    
    // Get values from form
    const settings = {
        analysis: {
            default_k_value: parseInt(document.getElementById('defaultKValue').value) || 3,
            max_products: parseInt(document.getElementById('maxProducts').value) || 100,
            weekly_analysis_enabled: document.getElementById('weeklyAnalysis').value === 'true',
            monthly_analysis_enabled: document.getElementById('monthlyAnalysis').value === 'true'
        },
        email: {
            sender: document.getElementById('senderEmail').value || 'admin@polarization.com',
            otp_expiry_minutes: parseInt(document.getElementById('otpExpiry').value) || 10
        }
    };
    
    // Show saving message
    showMessage('<i class="fas fa-spinner fa-spin"></i> Saving settings...', 'info');
    
    try {
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login.html';
            return;
        }
        
        const response = await fetch(`${API_BASE}/api/system-settings`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(settings)
        });

        if (response.status === 401) {
            showMessage('❌ Session expired. Please login again.', 'danger');
            setTimeout(() => window.location.href = '/login.html', 2000);
            return;
        }

        if (response.status === 403) {
            showMessage('❌ Unauthorized access. Admin privileges required.', 'danger');
            setTimeout(() => window.location.href = '/dashboard.html', 2000);
            return;
        }

        const data = await response.json();
        
        if (data.status === 'success') {
            showMessage('✅ Settings saved successfully!', 'success');
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                const msg = document.getElementById('settingsMessage');
                msg.style.display = 'none';
            }, 3000);
        } else {
            showMessage('❌ Failed to save settings: ' + (data.message || 'Unknown error'), 'danger');
        }
    } catch (error) {
        console.error('Error saving settings:', error);
        showMessage('❌ Network error. Please try again.', 'danger');
    }
}

function showMessage(message, type = 'info') {
    const msg = document.getElementById('settingsMessage');
    msg.style.display = 'block';
    msg.className = `alert alert-${type}`;
    msg.innerHTML = message;
}

// ✅ Page Load
document.addEventListener('DOMContentLoaded', function() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    loadSettings();
});
</script>
</body>
</html>
