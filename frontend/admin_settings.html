<!DOCTYPE html>
<html>
<head>
    <title>System Settings - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="/admin_guard.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .hidden { display: none !important; }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .settings-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .form-label {
            font-weight: 600;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body >

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white"><i class="fas fa-cogs"></i> System Settings</h2>
        <a href="/dashboard.html" class="btn-gradient">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-white mt-2">Loading settings...</p>
    </div>

    <div class="settings-card" id="settingsForm" style="display: none;">
        <h4><i class="fas fa-chart-line"></i> Analysis Configuration</h4>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Default K-Value (Clusters)</label>
                <input type="number" id="defaultKValue" class="form-control" min="2" max="5" value="3">
                <small class="text-muted">Number of clusters for analysis</small>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Max Products Per Category</label>
                <input type="number" id="maxProducts" class="form-control" min="10" max="500" value="100">
                <small class="text-muted">Maximum products to analyze</small>
            </div>
        </div>

        <hr>

        <h4><i class="fas fa-calendar-alt"></i> Analysis Settings</h4>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Weekly Analysis</label>
                <select id="weeklyAnalysis" class="form-control">
                    <option value="true">Enabled</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Monthly Analysis</label>
                <select id="monthlyAnalysis" class="form-control">
                    <option value="true">Enabled</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="autoScheduler" checked>
                <label class="form-check-label" for="autoScheduler">Enable Automatic Weekly Data Collection</label>
            </div>
        </div>

        <hr>

        <h4><i class="fas fa-envelope"></i> Email Settings</h4>
        <div class="mb-3">
            <label class="form-label">OTP Expiry (minutes)</label>
            <input type="number" id="otpExpiry" class="form-control" min="5" max="30" value="10">
            <small class="text-muted">How long OTP remains valid</small>
        </div>

        <hr>

        <div class="text-end">
            <button type="button" class="btn-gradient" onclick="saveSettings()">
                <i class="fas fa-save"></i> Save Settings
            </button>
            <button type="button" class="btn btn-secondary ms-2" onclick="loadSettings()">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>

        <div id="settingsMessage" class="mt-3" style="display: none;"></div>
        
        <div class="mt-3 text-muted small">
            <i class="fas fa-clock"></i> Last updated: <span id="lastUpdated">Not set</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_BASE = 'https://product-polarization-analyzer-production.up.railway.app';

async function loadSettings() {
    document.getElementById('loadingSpinner').style.display = 'block';
    document.getElementById('settingsForm').style.display = 'none';
    
    try {
        const token = localStorage.getItem('token');
        
        // ✅ ADD TOKEN HEADER
        const response = await fetch(`${API_BASE}/api/system-settings`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (response.status === 401) {
            showError('❌ Session expired. Please login again.');
            setTimeout(() => window.location.href = '/login.html', 2000);
            return;
        }

        const data = await response.json();
        
        if (data.status === 'success') {
            const settings = data.settings || {};
            document.getElementById('defaultKValue').value = settings.analysis?.default_k_value || 3;
            document.getElementById('maxProducts').value = settings.analysis?.max_products || 100;
            document.getElementById('weeklyAnalysis').value = settings.analysis?.weekly_analysis_enabled ? 'true' : 'false';
            document.getElementById('monthlyAnalysis').value = settings.analysis?.monthly_analysis_enabled ? 'true' : 'false';
            document.getElementById('otpExpiry').value = settings.email?.otp_expiry_minutes || 10;
            document.getElementById('autoScheduler').checked = settings.analysis?.weekly_analysis_enabled || true;
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
            document.getElementById('settingsForm').style.display = 'block';
        } else {
            showError('Failed to load settings: ' + data.message);
        }
    } catch (error) {
        console.error('Error:', error);
        showError('Error loading settings. Please try again.');
    } finally {
        document.getElementById('loadingSpinner').style.display = 'none';
    }
}
async function saveSettings() {
    const settings = {
        analysis: {
            default_k_value: parseInt(document.getElementById('defaultKValue').value) || 3,
            max_products: parseInt(document.getElementById('maxProducts').value) || 100,
            weekly_analysis_enabled: document.getElementById('weeklyAnalysis').value === 'true',
            monthly_analysis_enabled: document.getElementById('monthlyAnalysis').value === 'true'
        },
        email: {
            otp_expiry_minutes: parseInt(document.getElementById('otpExpiry').value) || 10
        },
        scheduler: {
            auto_enabled: document.getElementById('autoScheduler').checked
        }
    };
    
    const msg = document.getElementById('settingsMessage');
    msg.style.display = 'block';
    msg.className = 'alert alert-info';
    msg.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving settings...';
    
    try {
        const token = localStorage.getItem('token');
        
        // ✅ ADD TOKEN HEADER
        const response = await fetch(`${API_BASE}/api/system-settings`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(settings)
        });

        if (response.status === 401) {
            showError('❌ Session expired. Please login again.');
            setTimeout(() => window.location.href = '/login.html', 2000);
            return;
        }

        const data = await response.json();
        
        if (data.status === 'success') {
            msg.className = 'alert alert-success';
            msg.innerHTML = '<i class="fas fa-check-circle"></i> Settings saved successfully!';
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        } else {
            msg.className = 'alert alert-danger';
            msg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Failed: ' + data.message;
        }
    } catch (error) {
        msg.className = 'alert alert-danger';
        msg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Network error. Please try again.';
    }
}
document.addEventListener('DOMContentLoaded', function() {
    if (!localStorage.getItem('token')) {
        window.location.href = '/login.html';
        return;
    }
    loadSettings();
});

function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    if (errorDiv && errorText) {
        errorDiv.style.display = 'none'; // Reset
        errorText.textContent = message;
        errorDiv.style.display = 'block';
    }
}
</script>
</body>
</html>
