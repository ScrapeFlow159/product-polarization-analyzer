<!DOCTYPE html>
<html>
<head>
    <title>System Settings - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .settings-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .form-label {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white"><i class="fas fa-cogs"></i> System Settings</h2>
        <a href="{{ url_for('dashboard') }}" class="btn-gradient">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <div class="settings-card">
        <form method="POST">
            <h4><i class="fas fa-cloud-upload-alt"></i> Apify Configuration</h4>
            <div class="mb-3">
                <label class="form-label">Apify API Key</label>
                <input type="password" name="apify_api_key" class="form-control" value="{{ settings.apify_api_key }}" placeholder="Enter your Apify API key">
                <small class="text-muted">Get your API key from Apify Console</small>
            </div>

            <hr>

            <h4><i class="fas fa-calendar-alt"></i> Scraping Schedule</h4>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Schedule Frequency</label>
                    <select name="scrape_schedule" class="form-control">
                        <option value="daily" {% if settings.scrape_schedule == 'daily' %}selected{% endif %}>Daily</option>
                        <option value="weekly" {% if settings.scrape_schedule == 'weekly' %}selected{% endif %}>Weekly</option>
                        <option value="manual" {% if settings.scrape_schedule == 'manual' %}selected{% endif %}>Manual Only</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Scrape Time (24h format)</label>
                    <input type="time" name="scrape_time" class="form-control" value="{{ settings.scrape_time }}">
                </div>
            </div>

            <hr>

            <h4><i class="fas fa-chart-line"></i> Analysis Parameters</h4>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Max Products Per Category</label>
                    <input type="number" name="max_products_per_category" class="form-control" value="{{ settings.max_products_per_category }}" min="10" max="500">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Default K-Value (Clusters)</label>
                    <input type="number" name="default_k_value" class="form-control" value="{{ settings.default_k_value }}" min="2" max="5">
                </div>
            </div>

            <div class="mb-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="enable_weekly_scheduler" id="enableScheduler" {% if settings.enable_weekly_scheduler %}checked{% endif %}>
                    <label class="form-check-label" for="enableScheduler">Enable Automatic Weekly Data Collection</label>
                </div>
            </div>

            <hr>

            <div class="text-end">
                <button type="submit" class="btn-gradient">
                    <i class="fas fa-save"></i> Save Settings
                </button>
            </div>

            <div class="mt-3 text-muted small">
                <i class="fas fa-clock"></i> Last updated: {{ settings.last_updated }}
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
