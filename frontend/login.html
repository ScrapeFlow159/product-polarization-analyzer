<!DOCTYPE html>
<html>
<head>
    <title>Login - 2FA System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center mb-4">
        <i class="fa-solid fa-right-to-bracket text-success"></i> Login
    </h3>

    <form id="loginForm">
        <div class="mb-3">
            <label><i class="fa-solid fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <!-- INLINE ERROR -->
        <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> <span id="errorText"></span>
        </div>

        <button type="submit" class="btn btn-success w-100">
            <i class="fa-solid fa-paper-plane"></i> Send OTP
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="/index.html">Create new account</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.style.display = 'none';
    
    const formData = {
        username: document.querySelector('[name="username"]').value.trim(),
        password: document.querySelector('[name="password"]').value.trim()
    };
    
    if (!formData.username || !formData.password) {
        showError("Username and password are required");
        return;
    }
    
    try {
        const response = await fetch('https://product-polarization-analyzer-production.up.railway.app/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok || data.status === 'success') {
            localStorage.setItem('username', formData.username);
            window.location.href = '/otp.html';
        } else {
            showError(data.message || data.detail || 'Login failed');
        }
    } catch (error) {
        showError('Network error. Please check your internet connection.');
    }
});

function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    if (errorDiv && errorText) {
        errorText.textContent = message;
        errorDiv.style.display = 'block';
    }
}
</script>
</body>
</html>
