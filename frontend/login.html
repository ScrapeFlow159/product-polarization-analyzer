<!DOCTYPE html>
<html>
<head>
    <title>Login - 2FA System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center mb-4">
        <i class="fa-solid fa-right-to-bracket text-success"></i> Login
    </h3>

    <form id="loginForm">
        <div class="mb-3">
            <label><i class="fa-solid fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success w-100">
            <i class="fa-solid fa-paper-plane"></i> Send OTP
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="/index.html">Create new account</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = {
        username: document.querySelector('[name=\"username\"]').value,
        password: document.querySelector('[name=\"password\"]').value
    };
    
    try {
        const response = await fetch('https://product-polarization-analyzer-production.up.railway.app/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (data.status === 'success' || response.ok) {
            alert('✅ ' + (data.message || 'OTP Sent!'));
            localStorage.setItem('username', formData.username); // Keeps track of user for OTP stage
            window.location.href = '/otp.html'; // Transitions to OTP validation view
        } else {
            alert('❌ ' + (data.message || 'Login failed'));
        }
    } catch (error) {
        alert('❌ Network error: ' + error.message);
    }
});
</script>
</body>
</html>
