<!DOCTYPE html>
<html>
<head>
    <title>Login - 2FA System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }
    </style>
</head>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = {
        username: document.querySelector('[name="username"]').value,
        password: document.querySelector('[name="password"]').value
    };
    
    try {
        const response = await fetch('https://product-polarization-analyzer-production.up.railway.app/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            alert('✅ ' + data.message);
            localStorage.setItem('username', formData.username);
            window.location.href = '/otp.html';
        } else {
            alert('❌ ' + data.message);
        }
    } catch (error) {
        alert('❌ Network error: ' + error.message);
    }
});
</script>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center mb-4">
        <i class="fa-solid fa-right-to-bracket text-success"></i> Login
    </h3>

    <!-- ✅ ADD FLASH MESSAGES HERE -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-circle-info"></i> {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label><i class="fa-solid fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control">
        </div>

        <div class="mb-3">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control">
        </div>

        <button type="submit" class="btn btn-success w-100">
            <i class="fa-solid fa-paper-plane"></i> Send OTP
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('register') }}">Create new account</a>
    </div>
</div>

<!-- Bootstrap JS for alert dismiss functionality -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
