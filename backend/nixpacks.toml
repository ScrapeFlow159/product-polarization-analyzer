[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "export PATH=/nix/store/*-python3-3.12.7/bin:$PATH",
  "pip install --no-cache-dir fastapi uvicorn pandas numpy scikit-learn pydantic python-jose passlib python-dotenv"
]

[phases.start]
cmds = ["uvicorn main:app --host 0.0.0.0 --port $PORT"]