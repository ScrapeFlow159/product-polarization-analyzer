[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = [
  "pip install uvicorn",
  "pip install fastapi",
  "pip install pandas numpy scikit-learn",
  "pip install pydantic python-jose[cryptography] passlib[bcrypt] python-dotenv"
]

[phases.start]
cmds = ["python -m uvicorn main:app --host 0.0.0.0 --port $PORT"]