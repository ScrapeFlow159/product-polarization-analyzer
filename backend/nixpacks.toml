[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = [
  "python -m pip install uvicorn"
]

[phases.start]
cmds = [
  "uvicorn main:app --host 0.0.0.0 --port $PORT"
]