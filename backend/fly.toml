app = "product-polarization-analyzer"
primary_region = "fra"

[build]
  [build.args]
    PYTHON_VERSION = "3.12"

[env]
  SECRET_KEY = "your-super-secret-key"
  ALGORITHM = "HS256"
  SENDER_EMAIL = "arobaarif271@gmail.com"
  APP_PASSWORD = "ekrpepzprnyklzry"

[[services]]
  http_checks = []
  internal_port = 8000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 50
    soft_limit = 25
    type = "connections"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"