<!DOCTYPE html>
<html>
<head>
    <title>Register - 2FA System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center mb-4">
        <i class="fa-solid fa-user-plus text-primary"></i> Register
    </h3>

    <!-- ✅ ADD FLASH MESSAGES HERE -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-circle-info"></i> {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label><i class="fa-solid fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control" >
        </div>

        <div class="mb-3">
            <label><i class="fa-solid fa-envelope"></i> Email</label>
            <input type="email" name="email" class="form-control" >
        </div>

        <div class="mb-3">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control" >
        </div>

        <div class="mb-3">
            <label><i class="fa-solid fa-user-tag"></i> Select Role</label>
            <select name="role" class="form-control" >
                <option value="User">User</option>
                <option value="Admin">Admin</option>
                <option value="Research Analyst">Research Analyst</option>
                <option value="Evaluator">Evaluator</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            <i class="fa-solid fa-user-check"></i> Create Account
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('login') }}">Already have an account?</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
