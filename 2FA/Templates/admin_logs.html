<!DOCTYPE html>
<html>
<head>
    <title>System Logs - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .logs-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .log-entry {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-family: monospace;
            font-size: 13px;
        }
        .log-entry:hover {
            background: #f8f9fa;
        }
        .log-info { border-left: 3px solid #17a2b8; }
        .log-error { border-left: 3px solid #dc3545; }
        .log-warning { border-left: 3px solid #ffc107; }
        .log-success { border-left: 3px solid #28a745; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white"><i class="fas fa-history"></i> System Logs</h2>
        <div>
            <form method="POST" action="{{ url_for('admin_clear_logs') }}" style="display: inline;">
                <button type="submit" class="btn-gradient" onclick="return confirm('Are you sure you want to clear all logs?')">
                    <i class="fas fa-trash-alt"></i> Clear All Logs
                </button>
            </form>
            <a href="{{ url_for('dashboard') }}" class="btn-gradient ms-2">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </div>

    <div class="logs-container">
        <h5><i class="fas fa-list"></i> Recent Activity (Last 100 logs)</h5>
        
        {% if logs %}
            <div class="mt-3">
                {% for log in logs %}
                <div class="log-entry log-{{ log[1]|lower }}">
                    <div class="d-flex justify-content-between">
                        <span>
                            <strong>[{{ log[3] }}]</strong>
                            <span class="badge 
                                {% if log[1] == 'ERROR' %}bg-danger
                                {% elif log[1] == 'WARNING' %}bg-warning
                                {% elif log[1] == 'SUCCESS' %}bg-success
                                {% else %}bg-info{% endif %}">
                                {{ log[1] }}
                            </span>
                            <span class="ms-2">{{ log[2] }}</span>
                        </span>
                    </div>
                </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-info mt-3">
                <i class="fas fa-info-circle"></i> No logs found. System is running smoothly!
            </div>
        {% endif %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
