<!DOCTYPE html>
<html>
<head>
    <title>Manage Users - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white"><i class="fas fa-users"></i> Manage Users</h2>
        <a href="{{ url_for('dashboard') }}" class="btn-gradient">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Current Role</th>
                        <th>Change Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user[0] }}</td>
                        <td><strong>{{ user[1] }}</strong></td>
                        <td>{{ user[2] }}</td>
                        <td>
                            <span class="badge 
                                {% if user[3] == 'Admin' %}bg-danger
                                {% elif user[3] == 'Research Analyst' %}bg-warning
                                {% elif user[3] == 'Evaluator' %}bg-info
                                {% else %}bg-secondary{% endif %}">
                                {{ user[3] }}
                            </span>
                        </td>
                        <td>
                            <form method="POST" action="{{ url_for('admin_change_role', user_id=user[0]) }}" style="display: inline;">
                                <select name="role" class="form-select form-select-sm" style="width: 150px; display: inline-block;">
                                    <option value="User" {% if user[3] == 'User' %}selected{% endif %}>User</option>
                                    <option value="Research Analyst" {% if user[3] == 'Research Analyst' %}selected{% endif %}>Research Analyst</option>
                                    <option value="Evaluator" {% if user[3] == 'Evaluator' %}selected{% endif %}>Evaluator</option>
                                    <option value="Admin" {% if user[3] == 'Admin' %}selected{% endif %}>Admin</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-primary">Update</button>
                            </form>
                        </td>
                        <td>
                            {% if user[1] != username %}
                            <a href="{{ url_for('admin_delete_user', user_id=user[0]) }}" 
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure you want to delete this user?')">
                                <i class="fas fa-trash"></i> Delete
                            </a>
                            {% else %}
                            <span class="text-muted"><i class="fas fa-lock"></i> Current User</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
